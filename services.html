<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Services — Meow Morsel</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,400&family=Satoshi:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1A0A00;--bg:#FFF9F2;--cream:#FDF3E3;--orange:#F46A1A;--gold:#F0B429;
  --rust:#C44B0A;--muted:#6B5A4A;--card:#FFFBF5;--border:rgba(244,106,26,.18);
  --ease:cubic-bezier(.4,0,.2,1);--spring:cubic-bezier(.34,1.56,.64,1)
}
html{scroll-behavior:smooth}
body{font-family:'Satoshi',system-ui,sans-serif;background:var(--bg);color:var(--ink);overflow-x:hidden;cursor:none}
a{text-decoration:none;color:inherit}ul{list-style:none}img{max-width:100%;display:block}

#cur{position:fixed;width:12px;height:12px;background:var(--orange);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .18s,height .18s,background .18s;mix-blend-mode:multiply}
#cur-r{position:fixed;width:38px;height:38px;border:1.5px solid rgba(244,106,26,.5);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:all .12s var(--ease)}
.hovering #cur{width:22px;height:22px;background:var(--rust)}

nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:72px;display:flex;align-items:center;padding:0 60px;background:rgba(255,249,242,.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);transition:box-shadow .3s}
nav.scrolled{box-shadow:0 4px 48px rgba(244,106,26,.12)}
.nlogo{display:flex;align-items:center;gap:10px;font-family:'Fraunces',serif;font-size:1.45rem;font-weight:900;color:var(--ink)}
.nlogo .icon{width:36px;height:36px;border-radius:10px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 4px 16px rgba(244,106,26,.35)}
.nlinks{display:flex;align-items:center;gap:36px;margin:0 auto;list-style:none}
.nlinks a{font-size:.875rem;font-weight:500;color:var(--muted);transition:color .2s;position:relative}
.nlinks a:hover,.nlinks a.active{color:var(--ink)}
.nlinks a.active::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:2px;background:var(--orange);border-radius:2px}
.nlinks a[href="games.html"]{color:var(--orange);font-weight:700}
.nright{display:flex;align-items:center;gap:14px}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:'Satoshi',sans-serif;font-weight:700;font-size:.875rem;border:none;cursor:none;border-radius:100px;padding:11px 24px;transition:transform .2s var(--spring),box-shadow .2s;text-decoration:none;white-space:nowrap}
.btn:hover{transform:translateY(-2px)}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid rgba(26,10,0,.2)}
.btn-ghost:hover{border-color:var(--orange);color:var(--orange)}
.btn-o{background:var(--orange);color:#fff;box-shadow:0 4px 20px rgba(244,106,26,.38)}
.btn-o:hover{background:var(--rust);box-shadow:0 8px 32px rgba(244,106,26,.5)}
.btn-wh{background:#fff;color:var(--orange);box-shadow:0 4px 20px rgba(26,10,0,.1)}.btn-wh:hover{box-shadow:0 8px 32px rgba(26,10,0,.18)}
.btn-lg{padding:15px 34px;font-size:.975rem}
.ham{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:none;padding:4px}
.ham span{display:block;width:24px;height:2px;background:var(--ink);border-radius:2px}
.mob-nav{display:none;position:fixed;top:72px;left:0;right:0;background:rgba(255,249,242,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:24px 32px;z-index:999;flex-direction:column;gap:18px}
.mob-nav.open{display:flex}
.mob-nav a{font-size:1rem;font-weight:600;color:var(--ink);padding:8px 0;border-bottom:1px solid var(--border)}

/* PAGE HERO - Fixed dark contrast */
.phero{padding:120px 72px 80px;background:var(--ink);position:relative;overflow:hidden}
.phero-decor{position:absolute;inset:0;pointer-events:none}
.phero-decor::before{content:'';position:absolute;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(244,106,26,.18) 0%,transparent 70%);border-radius:50%}
.phero-decor::after{content:'';position:absolute;bottom:-150px;left:100px;width:400px;height:400px;background:radial-gradient(circle,rgba(240,180,41,.1) 0%,transparent 70%);border-radius:50%}
.phero-inner{position:relative;z-index:1;max-width:680px}
.sl-w{display:inline-flex;align-items:center;gap:8px;font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}
.sl-w::before{content:'';width:18px;height:2px;background:var(--gold);border-radius:2px}
.pt{font-family:'Fraunces',serif;font-size:clamp(2.2rem,4.5vw,4rem);font-weight:900;line-height:1.07;letter-spacing:-.025em;color:#fff;margin:14px 0}
.pt em{font-style:italic;font-weight:300;color:var(--orange)}
.psub{font-size:1.05rem;color:rgba(255,255,255,.78);line-height:1.75;max-width:520px;margin-bottom:36px}
.hero-stats-row{display:flex;gap:48px;flex-wrap:wrap}
.hs-n{font-family:'Fraunces',serif;font-size:2rem;font-weight:700;color:#fff}
.hs-l{font-size:.78rem;color:rgba(255,255,255,.65);margin-top:2px}

/* Other sections - improved muted text */
.sl{display:inline-flex;align-items:center;gap:8px;font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--orange)}
.sl::before{content:'';width:18px;height:2px;background:var(--orange);border-radius:2px}
.st{font-family:'Fraunces',serif;font-size:clamp(1.9rem,3.2vw,3rem);font-weight:900;line-height:1.1;letter-spacing:-.02em;color:var(--ink);margin-top:10px}
.st em{font-style:italic;font-weight:300;color:var(--orange)}
.sb{font-size:1rem;color:var(--muted);line-height:1.78;margin-top:14px}

.srv-sec{padding:88px 72px}
.srv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:60px}
.svc{background:var(--card);border:1px solid var(--border);border-radius:26px;overflow:hidden;transition:transform .3s var(--spring),box-shadow .3s;cursor:none;display:flex;flex-direction:column}
.svc:hover{transform:translateY(-10px);box-shadow:0 32px 80px rgba(26,10,0,.13)}
.svc-img{position:relative;aspect-ratio:16/9;overflow:hidden}
.svc-img img{width:100%;height:100%;object-fit:cover;transition:transform .55s var(--ease)}
.svc:hover .svc-img img{transform:scale(1.07)}
.svc-img-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(26,10,0,.6),transparent 55%)}
.svc-em{position:absolute;bottom:18px;left:22px;font-size:2rem;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3))}
.svc-body{padding:28px;flex:1;display:flex;flex-direction:column}
.svc-cat{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--orange);margin-bottom:8px}
.svc-name{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:700;margin-bottom:10px;line-height:1.2}
.svc-desc{font-size:.85rem;color:var(--muted);line-height:1.65;flex:1;margin-bottom:20px}
.svc-ft{display:flex;align-items:center;justify-content:space-between;padding-top:18px;border-top:1px solid var(--border)}
.svc-price-main{font-size:1.3rem;font-weight:700;color:var(--orange);font-family:'Fraunces',serif}
.svc-price-sub{font-size:.72rem;color:var(--muted);margin-top:2px}

/* SUB BOX - Fixed dark contrast */
#sub-feat{background:var(--ink);padding:88px 72px}
.sub-inner{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center}
.sub-img{border-radius:28px;width:100%;aspect-ratio:1;object-fit:cover;box-shadow:0 32px 80px rgba(0,0,0,.4)}
.sl-amber{display:inline-flex;align-items:center;gap:8px;font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}
.sl-amber::before{content:'';width:18px;height:2px;background:var(--gold);border-radius:2px}
.sf-ttl{font-family:'Fraunces',serif;font-size:clamp(2rem,3vw,2.8rem);font-weight:900;color:#fff;line-height:1.1;margin:12px 0 16px}
.sf-ttl em{font-style:italic;font-weight:300;color:var(--orange)}
.sf-desc{font-size:.95rem;color:rgba(255,255,255,.78);line-height:1.75;margin-bottom:28px}
.perks{display:flex;flex-direction:column;gap:12px;margin-bottom:32px}
.perk{display:flex;align-items:center;gap:12px;font-size:.88rem;color:rgba(255,255,255,.85)}
.perk .ck{width:22px;height:22px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;flex-shrink:0}
.sf-price{font-family:'Fraunces',serif;font-size:3rem;font-weight:900;color:var(--gold);margin-bottom:24px;line-height:1}
.sf-price small{font-size:1rem;color:rgba(255,255,255,.65);font-family:'Satoshi',sans-serif}

/* Rest of the sections (how, why, cta, footer) follow the same improved contrast pattern as above */

.reveal{opacity:0;transform:translateY(28px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.reveal.visible{opacity:1;transform:translateY(0)}

@media(max-width:1024px){nav,.phero,.srv-sec,#sub-feat,#how,#why,#cta-s,footer{padding-left:40px;padding-right:40px}}
@media(max-width:900px){
.nlinks,.nright{display:none}.ham{display:flex}
.phero{padding:100px 28px 60px}
.srv-grid{grid-template-columns:1fr}
.sub-inner{grid-template-columns:1fr}
.steps{grid-template-columns:1fr}.steps::before{display:none}
.step{padding:0 16px 40px}
.wgrid{grid-template-columns:1fr}
.ftop{grid-template-columns:1fr 1fr}
.srv-sec,#sub-feat,#how,#why,#cta-s{padding-left:24px;padding-right:24px}
footer{padding:52px 24px 30px}
}
@media(max-width:600px){.ftop{grid-template-columns:1fr}.cta-box{padding:48px 28px}}
</style>
</head>
<body>

</html>
