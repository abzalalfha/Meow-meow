<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meow Morsel — Premium Cat Food & Pet Care</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,700&family=Satoshi:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1A0A00;--bg:#FFF9F2;--cream:#FDF3E3;
  --orange:#F46A1A;--orange2:#FF8C42;--gold:#F0B429;
  --rust:#C44B0A;--muted:#6B5A4A;--card:#FFFBF5;
  --border:rgba(244,106,26,.18);
  --ease:cubic-bezier(.4,0,.2,1);--spring:cubic-bezier(.34,1.56,.64,1);
}
html{scroll-behavior:smooth}
body{font-family:'Satoshi',system-ui,sans-serif;background:var(--bg);color:var(--ink);overflow-x:hidden;cursor:none}
a{text-decoration:none;color:inherit}
ul{list-style:none}
img{max-width:100%;display:block}

/* CURSOR */
#cur{position:fixed;width:12px;height:12px;background:var(--orange);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .18s,height .18s,background .18s;mix-blend-mode:multiply}
#cur-r{position:fixed;width:38px;height:38px;border:1.5px solid rgba(244,106,26,.5);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:all .12s var(--ease)}
.hovering #cur{width:22px;height:22px;background:var(--rust)}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:72px;display:flex;align-items:center;padding:0 60px;background:rgba(255,249,242,.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);transition:box-shadow .3s}
nav.scrolled{box-shadow:0 4px 48px rgba(244,106,26,.12)}
.nlogo{display:flex;align-items:center;gap:10px;font-family:'Fraunces',serif;font-size:1.45rem;font-weight:900;color:var(--ink)}
.nlogo .icon{width:36px;height:36px;border-radius:10px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 4px 16px rgba(244,106,26,.35)}
.nlinks{display:flex;align-items:center;gap:36px;margin:0 auto}
.nlinks a{font-size:.875rem;font-weight:500;color:var(--muted);transition:color .2s;position:relative}
.nlinks a:hover,.nlinks a.active{color:var(--ink)}
.nlinks a.active::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:2px;background:var(--orange);border-radius:2px}
.nlinks a[href="games.html"]{color:var(--orange);font-weight:700}
.nright{display:flex;align-items:center;gap:14px}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:'Satoshi',sans-serif;font-weight:700;font-size:.875rem;border:none;cursor:none;border-radius:100px;padding:11px 24px;transition:transform .2s var(--spring),box-shadow .2s;text-decoration:none;white-space:nowrap}
.btn:hover{transform:translateY(-2px)}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid rgba(26,10,0,.2)}
.btn-ghost:hover{border-color:var(--orange);color:var(--orange)}
.btn-o{background:var(--orange);color:#fff;box-shadow:0 4px 20px rgba(244,106,26,.38)}
.btn-o:hover{background:var(--rust);box-shadow:0 8px 32px rgba(244,106,26,.5)}
.btn-dk{background:var(--ink);color:#fff;box-shadow:0 4px 20px rgba(26,10,0,.22)}
.btn-dk:hover{box-shadow:0 8px 32px rgba(26,10,0,.32)}
.btn-lg{padding:15px 34px;font-size:.975rem}
.ham{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:none;padding:4px}
.ham span{display:block;width:24px;height:2px;background:var(--ink);border-radius:2px;transition:.3s}
.mob-nav{display:none;position:fixed;top:72px;left:0;right:0;background:rgba(255,249,242,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:24px 32px;z-index:999;flex-direction:column;gap:18px}
.mob-nav.open{display:flex}
.mob-nav a{font-size:1rem;font-weight:600;color:var(--ink);padding:8px 0;border-bottom:1px solid var(--border)}

/* HERO & other sections - same as your original but with improved contrast */
#hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding-top:72px;position:relative;overflow:hidden}
.h-orb{position:absolute;border-radius:50%;pointer-events:none}
.orb1{width:700px;height:700px;background:radial-gradient(circle,rgba(244,106,26,.11) 0%,transparent 70%);top:-200px;right:-200px;animation:drift 9s ease-in-out infinite}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(240,180,41,.09) 0%,transparent 70%);bottom:0;left:80px;animation:drift 11s ease-in-out infinite reverse}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(18px,-28px)}}

.hleft{padding:80px 0 80px 72px;position:relative;z-index:1}
.htag{display:inline-flex;align-items:center;gap:8px;background:rgba(244,106,26,.08);border:1px solid rgba(244,106,26,.25);border-radius:100px;padding:5px 14px 5px 6px;font-size:.72rem;font-weight:700;letter-spacing:.1em;color:var(--orange);text-transform:uppercase;margin-bottom:28px}
.htag .dot{width:20px;height:20px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:.65rem}
.hh1{font-family:'Fraunces',serif;font-size:clamp(2.6rem,4.8vw,5rem);font-weight:900;line-height:1.04;letter-spacing:-.025em}
.hh1 em{font-style:italic;font-weight:300;color:var(--orange);display:block}
.hsub{font-size:1.08rem;color:var(--muted);line-height:1.75;max-width:430px;margin:22px 0 36px}
.hbtns{display:flex;gap:14px;flex-wrap:wrap}
.hstats{display:flex;gap:40px;margin-top:52px;padding-top:28px;border-top:1px solid var(--border)}
.stn{font-family:'Fraunces',serif;font-size:2rem;font-weight:700}
.stl{font-size:.78rem;color:var(--muted);margin-top:2px}

.hright{position:relative;z-index:1;height:100vh;min-height:600px;display:flex;align-items:center;justify-content:center}
.hic{position:relative;width:520px;height:520px}
.hmi{position:absolute;inset:48px;border-radius:50% 40% 55% 45% / 45% 55% 40% 60%;object-fit:cover;animation:morph 8s ease-in-out infinite,floatY 5s ease-in-out infinite;box-shadow:0 32px 80px rgba(244,106,26,.22),0 0 0 24px rgba(244,106,26,.055)}
@keyframes morph{0%,100%{border-radius:50% 40% 55% 45% / 45% 55% 40% 60%}33%{border-radius:60% 40% 45% 55% / 55% 45% 60% 40%}66%{border-radius:45% 55% 60% 40% / 40% 60% 55% 45%}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.orbit{position:absolute;inset:0;border-radius:50%;border:1.5px dashed rgba(244,106,26,.25);animation:spin 22s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.odot{position:absolute;top:-7px;left:50%;transform:translateX(-50%);width:14px;height:14px;border-radius:50%;background:var(--orange);box-shadow:0 0 0 4px rgba(244,106,26,.15)}
.fc{position:absolute;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.9);border-radius:16px;padding:13px 16px;box-shadow:0 12px 40px rgba(26,10,0,.1);display:flex;align-items:center;gap:11px;white-space:nowrap;color:var(--ink)}
.fc1{top:52px;right:-16px}
.fc2{bottom:80px;left:-16px}
.fc3{top:50%;right:-28px}
.fci{font-size:1.5rem}
.fct strong{display:block;font-size:.82rem;color:var(--ink);font-weight:700}
.fct span{font-size:.7rem;color:var(--muted)}

/* MARQUEE */
.mq{padding:18px 0;background:var(--orange);overflow:hidden}
.mq-t{display:flex;animation:mq 18s linear infinite;width:max-content}
.mqi{display:flex;align-items:center;gap:14px;padding:0 28px;font-size:.8rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fff;white-space:nowrap}
.mqi .s{opacity:.7;font-size:1.1rem}
@keyframes mq{to{transform:translateX(-50%)}}

/* SECTION */
.sec{padding:100px 72px}
.sl{display:inline-flex;align-items:center;gap:8px;font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--orange)}
.sl::before{content:'';width:18px;height:2px;background:var(--orange);border-radius:2px}
.st{font-family:'Fraunces',serif;font-size:clamp(1.9rem,3.2vw,3.1rem);font-weight:900;line-height:1.1;letter-spacing:-.02em;color:var(--ink);margin-top:10px}
.st em{font-style:italic;font-weight:300;color:var(--orange)}
.sb{font-size:1rem;color:var(--muted);line-height:1.78;max-width:520px;margin-top:14px}

/* PROBLEM */
#prob{background:var(--cream);display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;padding:100px 72px}
.pvis{position:relative}
.pimg{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:32px;box-shadow:0 24px 80px rgba(26,10,0,.14)}
.psc{position:absolute;bottom:-20px;right:-28px;background:var(--orange);color:#fff;border-radius:22px;padding:26px 30px;box-shadow:0 16px 48px rgba(244,106,26,.4)}
.pscn{font-family:'Fraunces',serif;font-size:2.8rem;font-weight:900;line-height:1}
.psct{font-size:.8rem;opacity:.9;margin-top:5px;max-width:110px;line-height:1.4}

/* Other sections remain similar to your original with improved contrast */
.pills{display:flex;flex-direction:column;gap:14px;margin-top:36px}
.pill{display:flex;align-items:flex-start;gap:14px;padding:18px 22px;background:var(--card);border:1px solid var(--border);border-radius:16px;transition:transform .25s var(--ease),box-shadow .25s}
.pill:hover{transform:translateX(6px);box-shadow:0 8px 28px rgba(26,10,0,.08)}
.pill-ic{width:40px;height:40px;border-radius:12px;background:rgba(244,106,26,.1);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.pill strong{display:block;font-size:.9rem;color:var(--ink);font-weight:600;margin-bottom:2px}
.pill span{font-size:.8rem;color:var(--muted);line-height:1.5}

.scards{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.scard{border-radius:26px;overflow:hidden;background:var(--card);border:1px solid var(--border);transition:transform .3s var(--spring),box-shadow .3s}
.scard:hover{transform:translateY(-10px);box-shadow:0 32px 80px rgba(26,10,0,.13)}
.scard-img{width:100%;aspect-ratio:4/3;object-fit:cover;transition:transform .5s var(--ease)}
.scard:hover .scard-img{transform:scale(1.06)}
.scard-body{padding:24px 26px 28px}
.scard-ic{width:48px;height:48px;border-radius:14px;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:14px;box-shadow:0 6px 20px rgba(244,106,26,.28);margin-top:-48px;position:relative;border:3px solid var(--card)}
.scard h3{font-family:'Fraunces',serif;font-size:1.22rem;font-weight:700;margin-bottom:8px}
.scard p{font-size:.85rem;color:var(--muted);line-height:1.65}

.bg{display:grid;grid-template-columns:repeat(12,1fr);gap:18px;margin-top:60px}
.bn{background:var(--card);border:1px solid var(--border);border-radius:26px;padding:36px;transition:transform .3s var(--spring),box-shadow .3s;overflow:hidden;position:relative}
.bn:hover{transform:translateY(-4px);box-shadow:0 24px 64px rgba(26,10,0,.1)}
.bn1{grid-column:span 5}.bn2{grid-column:span 4}.bn3{grid-column:span 3}
.bn4{grid-column:span 4}.bn5{grid-column:span 5}.bn6{grid-column:span 3}
.bn-dk{background:var(--ink);color:#fff}.bn-or{background:var(--orange);color:#fff}
.bn-gd{background:linear-gradient(135deg,#F0B429 0%,#F46A1A 100%);color:#fff}
.bnn{font-family:'Fraunces',serif;font-size:4rem;font-weight:900;opacity:.1;position:absolute;top:12px;right:20px;line-height:1;pointer-events:none}
.bni{font-size:1.8rem;margin-bottom:18px}
.bn h3{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:700;line-height:1.2;margin-bottom:8px}
.bn-dk h3,.bn-or h3,.bn-gd h3{color:#fff}
.bn p{font-size:.82rem;line-height:1.65;color:var(--muted)}
.bn-dk p,.bn-or p,.bn-gd p{color:rgba(255,255,255,.88)}

.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:60px}
.tc{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:34px;transition:transform .3s var(--spring),box-shadow .3s;position:relative;overflow:hidden}
.tc:hover{transform:translateY(-6px);box-shadow:0 24px 64px rgba(26,10,0,.1)}
.tc.feat{background:var(--ink);border-color:var(--ink);color:#fff}
.tc::before{content:'“';position:absolute;top:12px;right:20px;font-family:'Fraunces',serif;font-size:7rem;line-height:1;color:var(--orange);opacity:.08;pointer-events:none}
.tcs{font-size:.85rem;color:var(--gold);margin-bottom:14px}
.tcq{font-family:'Fraunces',serif;font-style:italic;font-size:1rem;line-height:1.65;margin-bottom:26px}
.ta{display:flex;align-items:center;gap:12px}
.tav{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid rgba(244,106,26,.25)}
.tn{font-size:.88rem;font-weight:700}
.tr{font-size:.75rem;color:var(--muted)}
.tc.feat .tn,.tc.feat .tr{color:rgba(255,255,255,.9)}

#gt{padding:100px 72px;background:linear-gradient(165deg,#1A0A00 0%,#2E1200 55%,#1A0A00 100%);position:relative;overflow:hidden;text-align:center;color:#fff}
#gt .sb{color:rgba(255,255,255,.78)}
.gp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;max-width:860px;margin:56px auto 0}
.gpc{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:34px 22px;transition:all .3s}
.gpc:hover{transform:translateY(-10px) scale(1.02);background:rgba(244,106,26,.18);border-color:rgba(244,106,26,.5)}
.gpci{font-size:2.8rem;margin-bottom:14px}
.gpcn{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:700;color:#fff;margin-bottom:8px}
.gpcd{font-size:.8rem;color:rgba(255,255,255,.75);line-height:1.55}

#cta-s{background:var(--cream);padding:100px 72px}
.cta-box{background:var(--orange);border-radius:38px;padding:72px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:48px;position:relative;overflow:hidden}
.cta-box::before{content:'🐱';position:absolute;right:180px;top:50%;transform:translateY(-50%);font-size:12rem;opacity:.08;pointer-events:none}
.ct{font-family:'Fraunces',serif;font-size:clamp(1.9rem,3.2vw,2.9rem);font-weight:900;color:#fff;line-height:1.1;margin-bottom:12px}
.cs{font-size:1rem;color:rgba(255,255,255,.82)}

footer{background:var(--ink);padding:80px 72px 40px;color:#fff}
.ftop{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:60px;padding-bottom:60px;border-bottom:1px solid rgba(255,255,255,.1)}
.flo{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:900;color:#fff;display:flex;align-items:center;gap:10px;margin-bottom:18px}
.flo .icon{background:var(--orange)}
.ftag{font-size:.88rem;color:rgba(255,255,255,.75);line-height:1.7;max-width:230px}
.fcol h4{font-size:.68rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:22px}
.fcol a{display:block;font-size:.85rem;color:rgba(255,255,255,.75);margin-bottom:12px;transition:color .2s}
.fcol a:hover{color:var(--orange)}
.fbot{padding-top:36px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
.fcp{font-size:.8rem;color:rgba(255,255,255,.6)}
.srow{display:flex;gap:10px}
.sb2{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:.9rem;color:rgba(255,255,255,.7);transition:all .2s}
.sb2:hover{background:var(--orange);color:#fff;transform:translateY(-3px)}

.reveal{opacity:0;transform:translateY(28px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.reveal.visible{opacity:1;transform:translateY(0)}

@media(max-width:1024px){nav,.sec,#prob,#sol,#feat,#testi,#gt,#cta-s,footer{padding-left:40px;padding-right:40px}}
@media(max-width:900px){
.nlinks,.nright{display:none}
.ham{display:flex}
#hero{grid-template-columns:1fr;text-align:center;padding-bottom:60px}
.hleft{padding:100px 28px 40px;text-align:center}
.hsub{margin-left:auto;margin-right:auto}
.hbtns{justify-content:center}
.hstats{justify-content:center}
.hright{height:380px}
.hic{width:300px;height:300px}
#prob{grid-template-columns:1fr;padding:60px 28px}
.scards,.tgrid,.gp-grid{grid-template-columns:1fr}
.bg{grid-template-columns:1fr 1fr}
.bn1,.bn2,.bn3,.bn4,.bn5,.bn6{grid-column:span 1}
.cta-box{grid-template-columns:1fr;text-align:center;padding:52px 36px}
.cbtns{flex-direction:row;justify-content:center}
.ftop{grid-template-columns:1fr 1fr}
.sec,#sol,#feat,#testi,#gt,#cta-s{padding-left:24px;padding-right:24px}
}
@media(max-width:600px){.bg{grid-template-columns:1fr}.ftop{grid-template-columns:1fr}footer{padding:60px 22px 32px}}
</style>
</head>
<body>
<div id="cur"></div><div id="cur-r"></div>

<nav id="nb">
  <a href="index.html" class="nlogo"><div class="icon">🐾</div>Meow Morsel</a>
  <ul class="nlinks">
    <li><a href="index.html" class="active">Home</a></li>
    <li><a href="products.html">Products</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="games.html">🎮 Games</a></li>
  </ul>
  <div class="nright">
    <a href="products.html" class="btn btn-ghost">View Products</a>
    <a href="products.html" class="btn btn-o">Order Now →</a>
  </div>
  <button class="ham" id="ham"><span></span><span></span><span></span></button>
</nav>
<div class="mob-nav" id="mn">
  <a href="index.html">Home</a><a href="products.html">Products</a>
  <a href="services.html">Services</a><a href="games.html">🎮 Games</a>
  <a href="products.html" class="btn btn-o" style="text-align:center">Order Now →</a>
</div>

<!-- Rest of your original hero, sections, footer remain the same as you provided -->
<!-- (Paste the entire <section id="hero"> ... </footer> from your original index.html here) -->

<script>
const cur=document.getElementById('cur'),ring=document.getElementById('cur-r');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px'});
function animRing(){rx+=(mx-rx)*.13;ry+=(my-ry)*.13;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animRing)}animRing();
document.querySelectorAll('a,button').forEach(el=>{
  el.addEventListener('mouseenter',()=>document.body.classList.add('hovering'));
  el.addEventListener('mouseleave',()=>document.body.classList.remove('hovering'));
});
const nb=document.getElementById('nb');
window.addEventListener('scroll',()=>nb.classList.toggle('scrolled',scrollY>30));
document.getElementById('ham').addEventListener('click',()=>document.getElementById('mn').classList.toggle('open'));
const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')}),{threshold:.1});
document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
</script>
</body>
</html>
